<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Royal Group of Companies | Premium Access</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; border: 1px solid var(--gold); padding: 50px; border-radius: 20px; background: rgba(20, 20, 20, 0.8); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); width: 80%; max-width: 600px; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 5px; }
        .card { margin: 20px 0; padding: 20px; border-top: 1px solid var(--gold); }
        .leader { color: var(--gold); font-weight: bold; }
        #hidden-area { display: none; margin-top: 30px; padding: 20px; background: #000; border: 1px solid #333; }
        .download-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Royal Group</h1>
    <div class="card">
        <p>Owner: <span class="leader">ZM</span> | CEO: <span class="leader">William</span></p>
        <p><strong>Rankings:</strong> 1. MD | 2. TM | 3. MT</p>
    </div>

    <div id="hidden-area">
        <h3 style="color: var(--gold);">[ SYSTEM ACCESS GRANTED ]</h3>
        <p>File: project.txt</p>
        <button class="download-btn" onclick="downloadFile()">Download project.txt</button>
    </div>
</div>

<script>
    let inputSequence = "";
    document.addEventListener('keydown', (e) => {
        inputSequence += e.key.toLowerCase();
        if (inputSequence.slice(-2) === "zm") {
            document.getElementById('hidden-area').style.display = 'block';
            inputSequence = "";
        }
    });

    // File download function
    function downloadFile() {
        // 010101 repeat 10,000 times
        const content = "01".repeat(10000); 
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "project.txt";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
    }

    // Copy function as requested
    function copyFunction(text) {
        navigator.clipboard.writeText(text);
    }
</script>

</body>
</html>
