<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexura Directory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 40px; }
        #searchBar { width: 100%; padding: 18px 25px; border: 2px solid #f0f0f0; border-radius: 30px; outline: none; font-size: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .user-card { background: #ffffff; padding: 20px 25px; margin: 10px 0; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .name { font-weight: 700; font-size: 18px; color: #222; }
        .balance { color: #555; font-weight: 600; background: #f4f4f4; padding: 6px 15px; border-radius: 12px; }
        /* Taha ke liye special styling */
        .taha-style { border: 2px solid #ffd700; background: #fffdf0; }
        .taha-style .name { color: #d4af37; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search users..." onkeyup="filterUsers()">
    </div>

    <div id="userList" style="width: 100%; max-width: 600px;"></div>

    <script>
        const users = [
            { name: "TAHA MUJTABA", balance: "10 million.mt" },
            { name: "MUHAMMAD TAQI", balance: "500,000.tm" },
            { name: "ALI AHMED", balance: "25,000.md" },
            { name: "SARA KHAN", balance: "1.2 million.ans" },
            { name: "HAMZA BUTT", balance: "800,000.th" },
            { name: "FATIMA ZAHRA", balance: "2 million.mt" },
            { name: "USMAN MALIK", balance: "450,000.tm" },
            { name: "ZAHRA ALI", balance: "90,000.md" },
            { name: "BILAL HASSAN", balance: "3.5 million.ans" },
            { name: "AYESHA NOOR", balance: "600,000.th" },
            { name: "OMAR FAROOQ", balance: "1.5 million.mt" },
            { name: "MARIA KHAN", balance: "120,000.tm" }
        ];

        // API Copy Function (Store rakha hai)
        function copyData(text) {
            navigator.clipboard.writeText(text);
        }

        function displayUsers(filter = "") {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            
            // Taha hamesha pehle rahega (Array order maintain hai)
            users.filter(u => u.name.toLowerCase().includes(filter.toLowerCase())).forEach((u, index) => {
                const isTaha = u.name === "TAHA MUJTABA" ? "taha-style" : "";
                list.innerHTML += `
                    <div class="user-card ${isTaha}">
                        <span class="name">${u.name}</span>
                        <span class="balance">${u.balance}</span>
                    </div>`;
            });
        }

        function filterUsers() {
            displayUsers(document.getElementById("searchBar").value);
        }

        displayUsers();
    </script>
</body>
</html>
